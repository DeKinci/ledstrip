root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/gateway ./cmd/gateway"
  bin = "./tmp/gateway"
  args_bin = ["-addr", ":8080"]
  delay = 1000
  include_ext = ["go", "html", "js", "css"]
  include_dir = ["cmd", "internal"]
  exclude_dir = ["tmp", "node_modules"]
  exclude_regex = ["_test\\.go$"]
  stop_on_error = true
  send_interrupt = true
  kill_delay = 500

[log]
  time = false
  main_only = true

[misc]
  clean_on_exit = true
