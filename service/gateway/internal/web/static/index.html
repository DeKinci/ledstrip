<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroProto Gateway</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: #e5e5e5; height: 100vh; display: flex; }

        .sidebar {
            width: 260px; background: #111; border-right: 1px solid #222;
            display: flex; flex-direction: column; flex-shrink: 0;
        }
        .sidebar-header {
            padding: 12px 16px; border-bottom: 1px solid #222;
            font-size: 14px; font-weight: 600; color: #888;
        }
        .device-list { flex: 1; overflow-y: auto; padding: 8px; }
        .device-item {
            padding: 10px 12px; border-radius: 8px; cursor: pointer;
            margin-bottom: 4px; transition: background 0.15s;
            display: flex; align-items: center; gap: 8px;
        }
        .device-item:hover { background: #1a1a1a; }
        .device-item.active { background: #1e3a5f; border: 1px solid #3b82f6; }
        .device-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .device-dot.online { background: #22c55e; }
        .device-dot.offline { background: #666; }
        .device-name { font-size: 13px; font-weight: 500; }
        .device-id { font-size: 10px; color: #666; }

        .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 16px; }
        .main .empty {
            flex: 1; display: flex; align-items: center; justify-content: center;
            color: #444; font-size: 14px;
        }

        /* Login */
        .login-overlay {
            position: fixed; inset: 0; background: #0a0a0a;
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }
        .login-box { background: #1a1a1a; border-radius: 12px; padding: 32px; width: 300px; }
        .login-box h2 { margin-bottom: 20px; font-size: 18px; }
        .login-box input {
            width: 100%; padding: 10px 12px; margin-bottom: 12px;
            background: #252525; border: 1px solid #333; border-radius: 6px;
            color: white; font-size: 14px;
        }
        .login-box input:focus { outline: none; border-color: #3b82f6; }
        .login-box button {
            width: 100%; padding: 10px; background: #3b82f6; color: white;
            border: none; border-radius: 6px; font-size: 14px; cursor: pointer;
        }
        .login-box .error { color: #ef4444; font-size: 12px; margin-top: 8px; }
        .hidden { display: none !important; }

        /* Toast */
        .toast-container {
            position: fixed; top: 16px; right: 16px; z-index: 1000;
            display: flex; flex-direction: column; gap: 8px; pointer-events: none;
        }
        .toast {
            padding: 10px 16px; border-radius: 8px; font-size: 13px; color: white;
            pointer-events: auto; max-width: 320px;
            animation: toastIn 0.2s ease-out, toastOut 0.3s ease-in 3.7s forwards;
        }
        .toast-error { background: #dc2626; }
        .toast-info { background: #2563eb; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

        /* Widget styles */
        .mp-btn { padding: 8px 16px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: opacity 0.15s; }
        .mp-btn:hover { opacity: 0.85; }
        .mp-btn-sm { padding: 4px 10px; font-size: 12px; }
        .mp-btn-primary { background: #3b82f6; color: white; }
        .mp-btn-warning { background: #f59e0b; color: white; }
        .mp-btn-danger { background: #ef4444; color: white; }
        .mp-btn-ghost { background: transparent; color: #888; }
        .mp-btn-teal { background: #14b8a6; color: white; }

        input[type="range"] {
            width: 100%; height: 8px; border-radius: 4px; background: #333;
            outline: none; -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 20px; height: 20px;
            border-radius: 50%; background: #fff; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toasts"></div>

    <!-- Login -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>MicroProto Gateway</h2>
            <input type="text" id="loginUser" placeholder="Username" value="admin">
            <input type="password" id="loginPass" placeholder="Password">
            <button onclick="login()">Login</button>
            <div class="error hidden" id="loginError"></div>
        </div>
    </div>

    <!-- App -->
    <div class="sidebar" id="sidebarEl" style="display:none">
        <div class="sidebar-header">Devices</div>
        <div class="device-list" id="deviceList"></div>
        <div style="border-top:1px solid #222;padding:8px;">
            <div style="font-size:11px;color:#666;margin-bottom:6px;">Device Tokens</div>
            <div id="tokenList" style="font-size:11px;margin-bottom:6px;"></div>
            <button onclick="createToken()" style="width:100%;padding:6px;background:#252525;border:1px solid #333;border-radius:4px;color:#aaa;font-size:11px;cursor:pointer;">+ New Token</button>
        </div>
        <div style="border-top:1px solid #222;padding:8px;">
            <button onclick="logout()" style="width:100%;padding:6px;background:transparent;border:1px solid #333;border-radius:4px;color:#666;font-size:11px;cursor:pointer;">Logout</button>
        </div>
    </div>
    <div class="main" id="mainPanel" style="display:none">
        <div class="empty" id="emptyState">Select a device</div>
        <div id="deviceUI" class="hidden"></div>
    </div>

    <script src="/microproto-client.js"></script>
    <script src="/microproto-ui.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ext-language_tools.min.js"></script>
    <script>
        let sessionToken = localStorage.getItem('session');
        let selectedDevice = null;
        let devices = [];
        let currentClient = null;
        let currentRenderer = null;

        if (sessionToken) { showApp(); refreshDevices(); }

        async function login() {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                if (!res.ok) throw new Error('Invalid credentials');
                const data = await res.json();
                sessionToken = data.token;
                localStorage.setItem('session', sessionToken);
                showApp();
                refreshDevices();
            } catch (e) {
                const err = document.getElementById('loginError');
                err.textContent = e.message;
                err.classList.remove('hidden');
            }
        }

        function showApp() {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('sidebarEl').style.display = '';
            document.getElementById('mainPanel').style.display = '';
            refreshTokens();
        }

        function logout() { localStorage.removeItem('session'); location.reload(); }

        async function refreshDevices() {
            try {
                const res = await fetch('/api/devices', {
                    headers: { 'Authorization': 'Bearer ' + sessionToken }
                });
                if (res.status === 401) { localStorage.removeItem('session'); location.reload(); return; }
                devices = await res.json();
                renderDevices();
            } catch (e) { console.error(e); }
            setTimeout(refreshDevices, 5000);
        }

        function renderDevices() {
            const list = document.getElementById('deviceList');
            list.innerHTML = '';
            (devices || []).forEach(dev => {
                const item = document.createElement('div');
                item.className = 'device-item' + (selectedDevice === dev.id ? ' active' : '');
                item.innerHTML = `
                    <div class="device-dot ${dev.online ? 'online' : 'offline'}"></div>
                    <div style="flex:1;min-width:0">
                        <div class="device-name">${dev.name || dev.id}</div>
                        <div class="device-id">${dev.id}</div>
                    </div>
                    <button onclick="event.stopPropagation();removeDevice('${dev.id}')" style="background:none;border:none;color:#444;cursor:pointer;font-size:12px;padding:4px" title="Remove">✕</button>
                `;
                item.onclick = () => selectDevice(dev);
                list.appendChild(item);
            });
        }

        async function removeDevice(id) {
            if (!confirm('Remove this device?')) return;
            await fetch('/api/devices/' + id, {
                method: 'DELETE', headers: { 'Authorization': 'Bearer ' + sessionToken }
            });
            if (selectedDevice === id) disconnectDevice();
        }

        function disconnectDevice() {
            if (currentRenderer) { currentRenderer.destroy(); currentRenderer = null; }
            if (currentClient) { currentClient.disconnect?.(); currentClient = null; }
            selectedDevice = null;
            document.getElementById('deviceUI').classList.add('hidden');
            document.getElementById('deviceUI').innerHTML = '';
            document.getElementById('emptyState').classList.remove('hidden');
            document.getElementById('emptyState').textContent = 'Select a device';
        }

        function selectDevice(dev) {
            if (selectedDevice === dev.id) return;
            disconnectDevice();

            if (!dev.online) {
                selectedDevice = dev.id;
                renderDevices();
                document.getElementById('emptyState').textContent = dev.name + ' is offline';
                return;
            }

            selectedDevice = dev.id;
            renderDevices();

            const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${wsProto}//${location.host}/ws/proxy/${dev.id}`;

            currentClient = new MicroProtoClient(wsUrl, { debug: false });

            const uiDiv = document.getElementById('deviceUI');
            uiDiv.innerHTML = '';
            uiDiv.classList.remove('hidden');
            document.getElementById('emptyState').classList.add('hidden');

            currentRenderer = MicroProtoUI.renderAll(uiDiv, currentClient, { layout: 'single' });
            currentClient.connect();
        }

        async function createToken() {
            const name = prompt('Token name:');
            if (!name) return;
            try {
                const res = await fetch('/api/auth/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + sessionToken },
                    body: JSON.stringify({ name })
                });
                if (!res.ok) throw new Error('Failed');
                const data = await res.json();
                refreshTokens();
                prompt('Device token:', data.token);
            } catch (e) { alert('Error: ' + e.message); }
        }

        async function refreshTokens() {
            try {
                const res = await fetch('/api/auth/tokens', {
                    headers: { 'Authorization': 'Bearer ' + sessionToken }
                });
                if (!res.ok) return;
                const tokens = await res.json();
                const list = document.getElementById('tokenList');
                list.innerHTML = (tokens || []).map(t => {
                    const short = t.token.length > 8 ? t.token.slice(0,4) + '...' + t.token.slice(-4) : t.token;
                    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:2px 0;gap:4px">
                        <span style="color:#aaa;flex:1;overflow:hidden;text-overflow:ellipsis">${t.name || 'unnamed'}</span>
                        <span onclick="prompt('Token:','${t.token}')" style="color:#555;cursor:pointer;font-family:monospace" title="Click to copy">${short}</span>
                        <button onclick="deleteToken('${t.token}')" style="background:none;border:none;color:#666;cursor:pointer;font-size:10px">✕</button>
                    </div>`;
                }).join('');
            } catch (e) {}
        }

        async function deleteToken(token) {
            if (!confirm('Delete this token?')) return;
            await fetch('/api/auth/token/' + token, {
                method: 'DELETE', headers: { 'Authorization': 'Bearer ' + sessionToken }
            });
            refreshTokens();
        }
    </script>
</body>
</html>
