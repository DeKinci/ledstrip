<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LED Strip</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            min-height: 100vh;
            padding: 16px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px; padding: 0 4px;
        }
        .status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #888; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; }
        .status-dot.connected { background: #22c55e; }

        /* Toast */
        .toast-container {
            position: fixed; top: 16px; right: 16px; z-index: 1000;
            display: flex; flex-direction: column; gap: 8px; pointer-events: none;
        }
        .toast {
            padding: 10px 16px; border-radius: 8px; font-size: 13px; color: white;
            pointer-events: auto; max-width: 320px; word-break: break-word;
            animation: toastIn 0.2s ease-out, toastOut 0.3s ease-in 3.7s forwards;
        }
        .toast-error { background: #dc2626; }
        .toast-info { background: #2563eb; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

        /* Button styles used by widgets */
        .mp-btn { padding: 8px 16px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: opacity 0.15s; }
        .mp-btn:hover { opacity: 0.85; }
        .mp-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .mp-btn-sm { padding: 4px 10px; font-size: 12px; }
        .mp-btn-primary { background: #3b82f6; color: white; }
        .mp-btn-warning { background: #f59e0b; color: white; }
        .mp-btn-danger { background: #ef4444; color: white; }
        .mp-btn-ghost { background: transparent; color: #888; }
        .mp-btn-teal { background: #14b8a6; color: white; }

        /* Range slider */
        input[type="range"] {
            width: 100%; height: 8px; border-radius: 4px; background: #333;
            outline: none; -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 20px; height: 20px;
            border-radius: 50%; background: #fff; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toasts"></div>
    <div class="container">
        <div class="header">
            <div class="status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Connecting...</span>
            </div>
            <span style="display:flex;gap:8px;align-items:center">
                <button onclick="localStorage.clear();location.reload()" style="background:none;border:none;color:#444;cursor:pointer;font-size:10px" title="Clear cache &amp; reconnect">↻</button>
                <a href="/ble" style="color:#555;text-decoration:none;font-size:11px;">BLE</a>
            </span>
        </div>
        <div id="app"></div>
    </div>

    <script src="/js/proto.js"></script>
    <script src="/js/ui.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ext-language_tools.min.js"></script>
    <script>
        const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsMeta = document.querySelector('meta[name="ws-url"]');
        const wsUrl = wsMeta
            ? (wsMeta.content.startsWith('//') ? wsProto + wsMeta.content : wsMeta.content)
            : `${wsProto}//${location.hostname}:81`;

        const client = new MicroProtoClient(wsUrl, { debug: false });

        // Connection status
        client.on('connect', () => {
            document.getElementById('statusDot').classList.add('connected');
            document.getElementById('statusText').textContent = 'Connected';
        });
        client.on('disconnect', () => {
            document.getElementById('statusDot').classList.remove('connected');
            document.getElementById('statusText').textContent = 'Reconnecting...';
        });
        client.on('error', (err) => {
            const el = document.createElement('div');
            el.className = 'toast toast-error';
            el.textContent = err.message || String(err);
            document.getElementById('toasts').appendChild(el);
            setTimeout(() => el.remove(), 4000);
        });

        // Render all widgets from schema
        MicroProtoUI.renderAll(document.getElementById('app'), client, {
            layout: 'two-column'
        });

        client.connect();
    </script>
</body>
</html>
