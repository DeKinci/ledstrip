; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
;
; Structure:
;   [common]          - shared build flags for all boards
;   [board_xiao_s3]   - XIAO ESP32-S3 board base (virtual)
;   [board_c3]        - ESP32-C3 DevKit board base (virtual)
;   env:*             - concrete buildable environments

[platformio]
src_dir = device/ledstrip/src
lib_dir = lib
test_dir = test_generated
default_envs = minic-v4
extra_configs = secrets.ini

; ---------------------------------------------------------------------------
; 1. Shared across all boards
; ---------------------------------------------------------------------------
[common]
build_flags =
	-std=c++23
	-Ilib/MicroCore/src
	-include XiaoPins.h
	-DLUA_32BITS
	-Wno-unused-variable
	-DASYNCWEBSERVER_REGEX
	-DCONFIG_FATFS_MAX_LFN=255
	-DCONFIG_FATFS_LFN_STACK=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
	-DCONFIG_NIMBLE_CPP_LOG_LEVEL=5
	-DCONFIG_BT_NIMBLE_PINNED_TO_CORE=0
	-DCONFIG_LWIP_MAX_ACTIVE_TCP=16
	-DCONFIG_LWIP_MAX_LISTENING_TCP=8
	-DCONFIG_TCP_MSS=1436
	-DCONFIG_TCP_MSL=60000
	-DCONFIG_TCP_SND_BUF_DEFAULT=5744
	-DCONFIG_TCP_WND_DEFAULT=5744
	-DCONFIG_TCP_RECVMBOX_SIZE=12
	-DCONFIG_TCP_QUEUE_OOSEQ=1
	-DCONFIG_LWIP_TCP_SYNMAXRTX=6
	-DCONFIG_ESP_WIFI_AMPDU_TX_ENABLED=0
	-DCONFIG_ESP_WIFI_AMPDU_RX_ENABLED=0
lib_deps =
	bblanchon/ArduinoJson@^7.4.1
	fastled/FastLED@^3.9.16
	ESP32Async/AsyncTCP
	ESP32Async/ESPAsyncWebServer
	ayushsharma82/NetWizard@^1.2.1
	h2zero/NimBLE-Arduino
	links2004/WebSockets@^2.7.1

; ---------------------------------------------------------------------------
; 2. Per-board bases (virtual — not buildable on their own)
; ---------------------------------------------------------------------------
[board_xiao_s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = seeed_xiao_esp32s3
framework = arduino
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.partitions = partitions_8mb.csv
board_build.filesystem = littlefs
board_build.arduino.upstream_packages = no
monitor_speed = 115200
upload_speed = 921600
test_speed = 115200
test_filter = */test/onboard/test_*
build_type = release
lib_compat_mode = strict
lib_ldf_mode = deep
extra_scripts =
	pre:infra/build/src/pio-hook.py
	infra/build/src/pio-integration.py

[board_c3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c3-devkitc-02
framework = arduino
board_build.partitions = partitions_4mb.csv
board_build.arduino.upstream_packages = no
monitor_speed = 115200
upload_speed = 115200
test_speed = 115200
test_filter = */test/onboard/test_*
build_type = release
lib_compat_mode = strict
lib_ldf_mode = deep
extra_scripts =
	pre:infra/build/src/pio-hook.py
	infra/build/src/pio-integration.py

; ---------------------------------------------------------------------------
; 3. Concrete environments
; ---------------------------------------------------------------------------

; XIAO S3, D10 led, no encoder, no mic
[env:minic-v4]
extends = board_xiao_s3
build_flags =
	${common.build_flags}
	${secrets.build_flags}
	-DLED_PIN=XIAO_D10
	-DLED_LIMIT=200
	-DLED_MODEL=WS2812B
	-DRGB_ORDER=GRB
lib_deps = ${common.lib_deps}

; XIAO S3, encoder + mic, D7 led
[env:gaslamp]
extends = board_xiao_s3
build_flags =
	${common.build_flags}
	-DLED_PIN=XIAO_D7
	-DLED_LIMIT=200
	-DLED_MODEL=WS2812B
	-DRGB_ORDER=GRB
	-DENCODER_ENABLED
	-DMIC_ENABLED
	-DMIC_SD=XIAO_D6
	-DMIC_SCK=XIAO_D5
	-DMIC_WS=XIAO_D4
lib_deps =
	${common.lib_deps}
	madhephaestus/ESP32Encoder@^0.12.0

; XIAO S3, WS2811 strip, encoder
[env:xiao-ws2811]
extends = board_xiao_s3
build_flags =
	${common.build_flags}
	-DLED_PIN=XIAO_D7
	-DLED_LIMIT=2
	-DLED_MODEL=WS2811
	-DRGB_ORDER=RGB
	-DMAX_POWER_MW=10000
	-DENCODER_ENABLED
lib_deps =
	${common.lib_deps}
	madhephaestus/ESP32Encoder@^0.12.0

; ESP32-C3 DevKit
[env:esp32-c3]
extends = board_c3
build_flags =
	${common.build_flags}
	-DLED_PIN=0
	-DLED_LIMIT=200
	-DLED_MODEL=WS2812B
	-DRGB_ORDER=GRB
lib_deps = ${common.lib_deps}

; ESP32 DevKit — LED test only
[env:esp32-devkit-test]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_src_filter = +<../test_led/>
lib_deps = fastled/FastLED@^3.9.16
build_flags =
	-DLED_PIN=4
	-DLED_COUNT=1
	-DLED_MODEL=WS2811
	-DRGB_ORDER=RGB

; ---------------------------------------------------------------------------
; 4. Integration test firmware
; ---------------------------------------------------------------------------

; MicroProto basic properties for protocol integration tests
[env:test_mp_basic]
extends = board_xiao_s3
build_src_filter = -<*> +<../../../lib/microproto-ws/test/integration/basic/firmware/>
build_flags =
	${common.build_flags}
	-DLED_PIN=XIAO_D10
lib_deps = ${common.lib_deps}

; Matter protocol integration tests
[env:test_matter]
extends = board_xiao_s3
build_src_filter = -<*> +<../../../lib/MicroProtoMatter/test/integration/matter-protocol/firmware/>
build_flags =
	${common.build_flags}
	-DLED_PIN=XIAO_D10
lib_deps = ${common.lib_deps}

; WiFiMan API integration tests
[env:test_wifi_api]
extends = board_xiao_s3
build_src_filter = -<*> +<../../../lib/wifiman/test/integration/wifi-api/firmware/>
build_flags =
	${common.build_flags}
	-DLED_PIN=XIAO_D10
lib_deps = ${common.lib_deps}

; Minimal HTTP server for webutils integration tests
[env:test_http_basic]
extends = board_xiao_s3
build_src_filter = -<*> +<../../../lib/webutils/test/integration/http-basic/firmware/>
build_flags =
	${common.build_flags}
	-DLED_PIN=XIAO_D10
lib_deps = ${common.lib_deps}

; BleMan integration tests (BLE peripheral management + driver system)
[env:test_bleman]
extends = board_xiao_s3
build_src_filter = -<*> +<../../../lib/bleman/test/integration/bleman-api/firmware/>
build_flags =
	${common.build_flags}
	-DLED_PIN=XIAO_D10
	-DCONFIG_BT_NIMBLE_MSYS1_BLOCK_COUNT=24
	-DCONFIG_BT_NIMBLE_TRANSPORT_ACL_FROM_LL_COUNT=20
	-DCONFIG_BT_NIMBLE_PINNED_TO_CORE=0
lib_deps = ${common.lib_deps}

; MicroBLE GATT integration tests (BLE echo service)
[env:test_ble_gatt]
extends = board_xiao_s3
build_src_filter = -<*> +<../../../lib/microble/test/integration/ble-gatt/firmware/>
build_flags =
	${common.build_flags}
	-DLED_PIN=XIAO_D10
	-DCONFIG_BT_NIMBLE_MSYS1_BLOCK_COUNT=24
	-DCONFIG_BT_NIMBLE_TRANSPORT_ACL_FROM_LL_COUNT=20
	-DCONFIG_BT_NIMBLE_PINNED_TO_CORE=0
	-DMICROBLE_MAX_MSG_SIZE=2048
	-DMICROBLE_MAX_CLIENTS=4
lib_deps = ${common.lib_deps}

; MicroProto advanced (all types, RPC, variants, objects)
[env:test_mp_advanced]
extends = board_xiao_s3
build_src_filter = -<*> +<../../../lib/microproto-ws/test/integration/advanced/firmware/>
build_flags =
	${common.build_flags}
	-DLED_PIN=XIAO_D10
lib_deps = ${common.lib_deps}

; MicroLog-Up log streaming integration tests
[env:test_logup]
extends = board_xiao_s3
build_src_filter = -<*> +<../../../lib/microlog-up/test/integration/log-streaming/firmware/>
build_flags =
	${common.build_flags}
	-DLED_PIN=XIAO_D10
lib_deps = ${common.lib_deps}

; MicroProto BLE transport integration tests
[env:test_mp_ble]
extends = board_xiao_s3
build_src_filter = -<*> +<../../../lib/microproto-ble/test/integration/ble-proto/firmware/>
build_flags =
	${common.build_flags}
	-DLED_PIN=XIAO_D10
	-DCONFIG_BT_NIMBLE_MSYS1_BLOCK_COUNT=24
	-DCONFIG_BT_NIMBLE_TRANSPORT_ACL_FROM_LL_COUNT=20
	-DCONFIG_BT_NIMBLE_PINNED_TO_CORE=0
lib_deps = ${common.lib_deps}

; MicroProto gateway client integration tests
[env:test_mp_gw]
extends = board_xiao_s3
build_src_filter = -<*> +<../../../lib/microproto-gw/test/integration/gateway/firmware/>
build_flags =
	${common.build_flags}
	${secrets.build_flags}
	-DLED_PIN=XIAO_D10
lib_deps = ${common.lib_deps}

; ---------------------------------------------------------------------------
; 5. Native unit tests (no hardware)
; ---------------------------------------------------------------------------

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_flags =
	-std=c++23
	-DNATIVE_TEST
	-Ilib/webutils/src
	-Ilib/MicroCore/src
	-Ilib/microproto/src
	-Ilib/microble/src
	-Ilib/microinput/src
	-Ilib/microlog/src
	-Ilib/microproto-gw/src
	-Ilib/MicroProtoMatter/src
	-Iinfra/mocks/Arduino/src
	-Iinfra/mocks/ArduinoJson
build_src_filter =
	+<../../../lib/webutils/src/HttpRequest.cpp>
	+<../../../lib/webutils/src/HttpResponse.cpp>
	+<../../../lib/webutils/src/HttpDispatcher.cpp>
	+<../../../lib/microproto/src/PropertyBase.cpp>
	+<../../../lib/microproto/src/FunctionBase.cpp>
	+<../../../lib/microproto/src/wire/TypeCodec.cpp>
	+<../../../lib/microproto/src/messages/Schema.cpp>
	+<../../../lib/microproto/src/messages/MessageRouter.cpp>
	+<../../../lib/microproto/src/MicroProtoController.cpp>
	+<../../../lib/MicroProtoMatter/src/MatterTransport.cpp>
	+<../../../infra/mocks/Arduino/src/Arduino.cpp>
	+<../../../infra/mocks/microlog/MicroLog.cpp>
	+<../../../infra/mocks/microproto/PropertySystem.cpp>
	+<../../../infra/mocks/microproto/ResourceStorage.cpp>
test_filter = native/test_*
